<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-title" content="분노 조절" />
  <title>분노 조절 훈련 일지</title>

  <!-- Inline SVG favicon (브라우저 탭 아이콘) — 균형 심볼 -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230d0d0d'/%3E%3Ccircle cx='50' cy='50' r='38' fill='%23111'/%3E%3Cpath d='M50 12 A38 38 0 0 0 50 88 A19 19 0 0 1 50 50 A19 19 0 0 0 50 12Z' fill='%23C62828' opacity='0.9'/%3E%3Cpath d='M50 12 A38 38 0 0 1 50 88 A19 19 0 0 0 50 50 A19 19 0 0 1 50 12Z' fill='%231A237E' opacity='0.85'/%3E%3Ccircle cx='50' cy='31' r='7' fill='%231A237E' opacity='0.95'/%3E%3Ccircle cx='50' cy='69' r='7' fill='%23C62828' opacity='0.95'/%3E%3Ccircle cx='50' cy='50' r='38' fill='none' stroke='%23888' stroke-width='1' opacity='0.25'/%3E%3C/svg%3E" />

  <!-- Apple touch icon (홈 화면 추가 시 아이콘) — PNG로 인라인 생성 -->
  <script>
  (function(){
    // SVG → Canvas → PNG → apple-touch-icon 동적 생성
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <!-- 균형 심볼: 분노와 평온의 음양 -->
      <rect width="512" height="512" rx="112" fill="#0d0d0d"/>
      <!-- 배경 원 -->
      <circle cx="256" cy="256" r="194" fill="#111"/>
      <!-- 분노(붉은) 반쪽 -->
      <path d="M256 62 A194 194 0 0 0 256 450 A97 97 0 0 1 256 256 A97 97 0 0 0 256 62Z" fill="#C62828" opacity="0.9"/>
      <!-- 평온(남색) 반쪽 -->
      <path d="M256 62 A194 194 0 0 1 256 450 A97 97 0 0 0 256 256 A97 97 0 0 1 256 62Z" fill="#1A237E" opacity="0.85"/>
      <!-- 음 속의 양 (위쪽 작은 점: 붉은 반에 남색 점) -->
      <circle cx="256" cy="159" r="36" fill="#1A237E" opacity="0.95"/>
      <!-- 양 속의 음 (아래쪽 작은 점: 남색 반에 붉은 점) -->
      <circle cx="256" cy="353" r="36" fill="#C62828" opacity="0.95"/>
      <!-- 외곽 링 -->
      <circle cx="256" cy="256" r="194" fill="none" stroke="#aaa" stroke-width="4" opacity="0.2"/>
      <!-- 중심 분리선 힌트 -->
      <line x1="256" y1="62" x2="256" y2="450" stroke="#0d0d0d" stroke-width="1.5" opacity="0.3"/>
    </svg>`;
    const blob = new Blob([svg], {type:'image/svg+xml'});
    const url  = URL.createObjectURL(blob);
    const img  = new Image(512, 512);
    img.onload = function(){
      const c = document.createElement('canvas');
      c.width = c.height = 512;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      const link = document.createElement('link');
      link.rel   = 'apple-touch-icon';
      link.sizes = '512x512';
      link.href  = c.toDataURL('image/png');
      document.head.appendChild(link);
    };
    img.src = url;
  })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; }
    body {
      background: #ffffff;
      color: #222;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding-bottom: env(safe-area-inset-bottom, 24px);
    }

    /* ── Layout ── */
    #app { max-width: 480px; margin: 0 auto; padding-bottom: 60px; }

    /* ── Header ── */
    .header { padding: 40px 24px 16px; }
    .header-label { font-family: 'Noto Serif KR', serif; font-size: 22px; color: #C62828; letter-spacing: 3px; margin-bottom: 10px; }
    .header h1 { font-family: 'DM Serif Display', serif; font-size: 34px; font-weight: 400; color: #111; line-height: 1.2; }
    .header h1 span { color: #999; font-size: 22px; }

    /* ── Tabs ── */
    .tabs { display: flex; padding: 0 24px; margin-bottom: 28px; border-bottom: 2px solid #e8e8e8; }
    .tab-btn {
      flex: 1; padding: 13px 0; background: none; border: none;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      color: #bbb; font-family: 'Noto Sans KR', sans-serif; font-size: 17px;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
    }
    .tab-btn.active { border-bottom-color: #C62828; color: #C62828; }

    /* ── Content ── */
    .content { padding: 0 24px; }
    .section { display: flex; flex-direction: column; gap: 22px; }
    .hidden { display: none; }

    /* ── Section divider ── */
    .divider { display: flex; align-items: center; gap: 10px; margin: 4px 0; }
    .divider-line { flex: 1; height: 1px; background: #ececec; }
    .divider-label { font-family: 'Noto Serif KR', serif; font-size: 17px; color: #bbb; letter-spacing: 2px; white-space: nowrap; }

    /* ── Field label ── */
    .field-label { display: block; font-family: 'Noto Serif KR', serif; font-size: 16px; color: #888; margin-bottom: 10px; letter-spacing: 1px; }

    /* ── Textarea ── */
    textarea {
      width: 100%; background: #f8f8f8; border: 1px solid #ddd; border-radius: 8px;
      color: #222; font-family: 'Noto Sans KR', sans-serif; font-size: 22px;
      line-height: 1.7; padding: 12px 14px; resize: none; outline: none;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    textarea:focus { border-color: #C62828; }
    textarea::placeholder { color: #ccc; }

    /* ── Tag buttons ── */
    .tag-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-btn {
      padding: 7px 14px; border-radius: 20px;
      border: 1.5px solid #ddd; background: transparent; color: #aaa;
      font-size: 16px; font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: all 0.2s; -webkit-appearance: none;
    }
    .tag-btn.active { border-color: #C62828; background: rgba(198,40,40,0.08); color: #C62828; }

    /* ── Gauge slider ── */
    .gauge-wrap { user-select: none; }
    .gauge-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .gauge-left { display: flex; align-items: center; gap: 8px; }
    .gauge-label { font-family: 'Noto Serif KR', serif; font-size: 16px; color: #888; letter-spacing: 1px; }
    .gauge-guide-btn {
      background: rgba(198,40,40,0.07); border: 1px solid rgba(198,40,40,0.2);
      border-radius: 10px; color: #C62828; font-size: 22px; padding: 2px 9px;
      cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    }
    .gauge-right { text-align: right; }
    .gauge-number { font-family: 'DM Serif Display', serif; font-size: 44px; line-height: 1; transition: color 0.3s; }
    .gauge-name { font-size: 22px; color: #aaa; font-family: 'Noto Sans KR', sans-serif; margin-top: 2px; }

    .guide-panel { background: #f8f8f8; border: 1px solid #e8e8e8; border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; }
    .guide-row { display: flex; align-items: flex-start; gap: 12px; padding: 5px 8px; border-radius: 7px; margin-bottom: 2px; transition: background 0.2s; }
    .guide-row.active { background: rgba(198,40,40,0.06); }
    .guide-range { font-family: 'DM Serif Display', serif; font-size: 17px; min-width: 36px; padding-top: 1px; }
    .guide-text-label { font-size: 16px; color: #888; font-family: 'Noto Sans KR', sans-serif; }
    .guide-row.active .guide-text-label { color: #C62828; }
    .guide-text-desc { font-size: 22px; color: #bbb; font-family: 'Noto Sans KR', sans-serif; margin-top: 1px; }

    .slider-track {
      position: relative; height: 8px; border-radius: 4px; background: #e8e8e8;
      cursor: pointer; touch-action: none;
    }
    .slider-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 4px; transition: width 0.1s, background 0.3s; }
    .slider-thumb {
      position: absolute; top: 50%; width: 30px; height: 30px; border-radius: 50%;
      border: 2.5px solid #ffffff; transform: translate(-50%, -50%);
      transition: background 0.3s, left 0.1s; pointer-events: none;
    }
    .slider-marks { display: flex; justify-content: space-between; margin-top: 6px; }
    .slider-mark { font-size: 22px; color: #ccc; font-family: monospace; }

    /* ── Coping grid ── */
    .coping-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .coping-btn {
      padding: 12px; border-radius: 10px; text-align: left;
      border: 1.5px solid #e8e8e8; background: #f8f8f8;
      cursor: pointer; transition: all 0.2s; -webkit-appearance: none;
    }
    .coping-btn.active { border-color: #4FC3F7; background: rgba(79,195,247,0.07); }
    .coping-icon { font-size: 28px; margin-bottom: 5px; }
    .coping-name { font-size: 16px; font-weight: 500; color: #555; font-family: 'Noto Sans KR', sans-serif; margin-bottom: 4px; }
    .coping-btn.active .coping-name { color: #0288D1; }
    .coping-desc { font-size: 22px; color: #aaa; font-family: 'Noto Sans KR', sans-serif; line-height: 1.5; }

    /* ── Feedback ── */
    .feedback-good { background: rgba(129,199,132,0.06); border: 1px solid rgba(129,199,132,0.15); border-radius: 10px; padding: 10px 14px; font-size: 17px; color: #81C784; }
    .feedback-bad  { background: rgba(239,83,80,0.05);  border: 1px solid rgba(239,83,80,0.15);  border-radius: 10px; padding: 10px 14px; font-size: 17px; color: #EF9A9A; }

    /* ── Save button ── */
    #save-btn {
      width: 100%; padding: 14px; border-radius: 10px; border: 1.5px solid #C62828;
      background: rgba(198,40,40,0.08); color: #C62828;
      font-family: 'Noto Serif KR', serif; font-size: 19px;
      cursor: pointer; transition: all 0.3s; letter-spacing: 1px;
    }
    #save-btn.saved { border-color: #388E3C; background: #e8f5e9; color: #388E3C; }

    /* ── History cards ── */
    .log-card { background: #f8f8f8; border: 1px solid #e8e8e8; border-radius: 12px; padding: 16px 18px; position: relative; margin-bottom: 12px; }
    .log-date { font-size: 19px; color: #bbb; font-family: monospace; }
    .log-timeslot { font-size: 22px; color: #aaa; font-family: 'Noto Sans KR', sans-serif; margin-top: 1px; }
    .log-intensity-row { display: flex; align-items: center; gap: 8px; margin: 8px 0 10px; flex-wrap: wrap; }
    .log-intensity { font-family: 'DM Serif Display', serif; font-size: 28px; }
    .log-arrow { color: #ccc; font-size: 22px; }
    .log-intensity-after { font-family: 'DM Serif Display', serif; font-size: 28px; }
    .log-reduce-badge { font-size: 22px; background: rgba(56,142,60,0.08); color: #388E3C; border: 1px solid rgba(56,142,60,0.2); border-radius: 10px; padding: 2px 8px; }
    .log-triggers { margin-left: auto; display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-end; max-width: 50%; }
    .log-trigger-tag { font-size: 22px; background: rgba(198,40,40,0.07); color: #C62828; border: 1px solid rgba(198,40,40,0.18); border-radius: 10px; padding: 2px 7px; }
    .log-field { margin: 5px 0; font-size: 17px; color: #555; line-height: 1.6; }
    .log-field-label { color: #bbb; font-size: 22px; margin-right: 4px; }
    .log-thought { border-left: 2px solid #e0e0e0; padding-left: 10px; color: #888; }
    .log-action { font-size: 16px; color: #999; }
    .log-activities { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .log-activity-tag { font-size: 22px; background: rgba(79,195,247,0.07); color: #0288D1; border: 1px solid rgba(79,195,247,0.25); border-radius: 10px; padding: 2px 8px; }
    .log-alt { margin-top: 8px; font-size: 16px; color: #388E3C; padding: 6px 10px; background: rgba(56,142,60,0.06); border-radius: 6px; }
    .log-delete { position: absolute; top: 12px; right: 14px; background: none; border: none; color: #ddd; font-size: 28px; cursor: pointer; line-height: 1; padding: 4px; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 60px 0; color: #bbb; font-size: 22px; }
    .empty span { color: #C62828; font-size: 16px; display: block; margin-top: 8px; }

    /* ── Stats ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .stat-card { background: #f8f8f8; border: 1px solid #e8e8e8; border-radius: 10px; padding: 14px 12px; text-align: center; }
    .stat-val { font-family: 'DM Serif Display', serif; font-size: 34px; color: #C62828; }
    .stat-label { font-size: 19px; color: #aaa; margin-top: 4px; }
    .stats-block { background: #f8f8f8; border: 1px solid #e8e8e8; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
    .stats-title { font-size: 22px; color: #bbb; font-family: 'Noto Serif KR', serif; letter-spacing: 1.5px; margin-bottom: 12px; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .bar-name { font-size: 16px; color: #777; min-width: 72px; }
    .bar-track { flex: 1; height: 4px; background: #e8e8e8; border-radius: 2px; }
    .bar-fill { height: 100%; border-radius: 2px; }
    .bar-count { font-size: 19px; color: #aaa; font-family: monospace; }
    .chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 70px; }
    .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .chart-bars-inner { display: flex; align-items: flex-end; gap: 1px; height: 60px; }
    .chart-bar { border-radius: 2px 2px 0 0; }
    .chart-label { font-size: 12px; color: #bbb; font-family: monospace; }
    .chart-legend { display: flex; gap: 14px; margin-top: 10px; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .legend-text { font-size: 22px; color: #aaa; }

    .hint { font-size: 22px; color: #ccc; font-family: monospace; margin-top: 8px; }

    /* ── Stats period tabs ── */
    .period-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .period-btn {
      flex: 1; padding: 8px 0; border-radius: 20px;
      border: 1.5px solid #e8e8e8; background: transparent; color: #bbb;
      font-family: 'Noto Sans KR', sans-serif; font-size: 15px;
      cursor: pointer; transition: all 0.2s;
    }
    .period-btn.active { border-color: #C62828; background: rgba(198,40,40,0.08); color: #C62828; font-weight: 500; }

    /* ── Chart label larger ── */
    .chart-label { font-size: 13px; color: #888; font-family: 'DM Serif Display', serif; margin-top: 4px; }

    /* ── Coping detail modal/panel ── */
    .coping-detail-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100;
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    .coping-detail-panel {
      background: #fff; border-radius: 20px 20px 0 0;
      padding: 28px 24px 40px; width: 100%; max-width: 480px;
      animation: slideUp 0.22s ease;
    }
    @keyframes slideUp { from { transform: translateY(60px); opacity:0 } to { transform: translateY(0); opacity:1 } }
    .coping-detail-icon { font-size: 44px; margin-bottom: 10px; }
    .coping-detail-title { font-family: 'Noto Serif KR', serif; font-size: 22px; color: #111; margin-bottom: 6px; }
    .coping-detail-subtitle { font-size: 14px; color: #aaa; margin-bottom: 20px; letter-spacing: 0.5px; }
    .coping-detail-steps { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .coping-detail-steps li {
      display: flex; gap: 12px; align-items: flex-start;
      background: #f8f8f8; border-radius: 10px; padding: 12px 14px;
    }
    .coping-step-num {
      min-width: 26px; height: 26px; border-radius: 50%;
      background: rgba(198,40,40,0.1); color: #C62828;
      font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .coping-step-text { font-size: 15px; color: #444; line-height: 1.6; }
    .coping-detail-tip { font-size: 14px; color: #888; border-left: 3px solid #e8e8e8; padding-left: 12px; line-height: 1.7; margin-bottom: 20px; }
    .coping-detail-close {
      width: 100%; padding: 13px; border-radius: 10px;
      border: 1.5px solid #e8e8e8; background: transparent; color: #888;
      font-family: 'Noto Sans KR', sans-serif; font-size: 16px; cursor: pointer;
    }

    /* ── Reset button ── */
    #reset-btn {
      width: 100%; padding: 13px; border-radius: 10px; border: 1.5px solid #e0e0e0;
      background: transparent; color: #bbb;
      font-family: 'Noto Serif KR', serif; font-size: 17px;
      cursor: pointer; transition: all 0.2s; letter-spacing: 1px; margin-top: 8px;
    }
    #reset-btn:hover { border-color: #C62828; color: #C62828; background: rgba(198,40,40,0.05); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #f5f5f5; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
  </style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;">
      <svg width="64" height="64" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" style="display:block;border-radius:18px;box-shadow:0 0 24px rgba(150,150,255,0.2);flex-shrink:0;">
        <!-- 균형 심볼: 분노(붉은)와 평온(남색)의 음양 -->
        <rect width="512" height="512" rx="112" fill="#0d0d0d"/>
        <circle cx="256" cy="256" r="194" fill="#111"/>
        <!-- 분노(붉은) 반쪽 -->
        <path d="M256 62 A194 194 0 0 0 256 450 A97 97 0 0 1 256 256 A97 97 0 0 0 256 62Z" fill="#C62828" opacity="0.9"/>
        <!-- 평온(남색) 반쪽 -->
        <path d="M256 62 A194 194 0 0 1 256 450 A97 97 0 0 0 256 256 A97 97 0 0 1 256 62Z" fill="#1A237E" opacity="0.85"/>
        <!-- 음 속의 양 -->
        <circle cx="256" cy="159" r="36" fill="#1A237E" opacity="0.95"/>
        <!-- 양 속의 음 -->
        <circle cx="256" cy="353" r="36" fill="#C62828" opacity="0.95"/>
        <!-- 외곽 링 -->
        <circle cx="256" cy="256" r="194" fill="none" stroke="#aaa" stroke-width="4" opacity="0.2"/>
      </svg>
      <div>
        <div class="header-label" style="margin-bottom:4px;">ANGER MANAGEMENT</div>
        <h1 style="margin:0;">분노 조절<br><span>훈련 일지</span></h1>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="record">기록</button>
    <button class="tab-btn" data-tab="history">히스토리</button>
    <button class="tab-btn" data-tab="stats">통계</button>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- ══ RECORD TAB ══ -->
    <div id="tab-record" class="section">

      <!-- 시간대 -->
      <div>
        <label class="field-label">날짜 · 시간대</label>
        <div class="tag-group" id="timeslot-group">
          <button class="tag-btn" data-val="새벽 (0–6시)">새벽 (0–6시)</button>
          <button class="tag-btn" data-val="오전 (6–12시)">오전 (6–12시)</button>
          <button class="tag-btn" data-val="오후 (12–18시)">오후 (12–18시)</button>
          <button class="tag-btn" data-val="저녁 (18–24시)">저녁 (18–24시)</button>
        </div>
        <div class="hint">저장 시 현재 날짜·시각이 자동 기록됩니다</div>
      </div>

      <!-- 구분선 -->
      <div class="divider"><div class="divider-line"></div><span class="divider-label">상황 기록</span><div class="divider-line"></div></div>

      <!-- 상황 -->
      <div>
        <label class="field-label">상황</label>
        <textarea id="situation" rows="2" placeholder="어떤 상황이었나요? 간단하게 적어보세요."></textarea>
      </div>

      <!-- 트리거 -->
      <div>

function saveLogs() { localStorage.setItem(STORAGE_KEY, JSON.stringify(logs)); }

function guideForValue(v) {
  if (v === 0) return ANGER_GUIDE[0];
  if (v <= 2)  return ANGER_GUIDE[1];
  if (v <= 4)  return ANGER_GUIDE[2];
  if (v <= 6)  return ANGER_GUIDE[3];
  if (v <= 8)  return ANGER_GUIDE[4];
  return ANGER_GUIDE[5];
}

function formatDateTime(iso) {
  const d = new Date(iso);
  const date = d.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
  const time = d.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
  return { date, time };
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Slider logic ───────────────────────────────────────────────────────────
function setupSlider(trackId, fillId, thumbId, numId, nameId, key) {
  const track = document.getElementById(trackId);
  const fill  = document.getElementById(fillId);
  const thumb = document.getElementById(thumbId);
  const numEl = document.getElementById(numId);
  const nameEl= document.getElementById(nameId);

  function getValFromEvent(e) {
    const rect = track.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return Math.round(pct * 10);
  }

  function updateUI(val) {
    const pct = (val / 10) * 100;
    const color = ANGER_COLORS[val];
    fill.style.width = pct + '%';
    fill.style.background = `linear-gradient(90deg, #4FC3F7, ${color})`;
    thumb.style.left = pct + '%';
    thumb.style.background = color;
    thumb.style.boxShadow = `0 0 12px ${color}99`;
    numEl.textContent = val;
    numEl.style.color = color;
    const g = guideForValue(val);
    nameEl.textContent = g.label;
    if (key === 'intensity') updateGuidePanel();
    updateFeedback();
  }

  let dragging = false;
  track.addEventListener('mousedown', e => { dragging = true; form[key] = getValFromEvent(e); updateUI(form[key]); e.preventDefault(); });
  track.addEventListener('touchstart', e => { dragging = true; form[key] = getValFromEvent(e); updateUI(form[key]); }, { passive: true });
  window.addEventListener('mousemove', e => { if (!dragging) return; form[key] = getValFromEvent(e); updateUI(form[key]); });
  window.addEventListener('touchmove', e => { if (!dragging) return; form[key] = getValFromEvent(e); updateUI(form[key]); }, { passive: true });
  window.addEventListener('mouseup', () => { dragging = false; });
  window.addEventListener('touchend', () => { dragging = false; });

  updateUI(form[key]);
}

// ── Guide panel ────────────────────────────────────────────────────────────
function buildGuidePanel() {
  const panel = document.getElementById('guide-panel');
  panel.innerHTML = ANGER_GUIDE.map(g => `
    <div class="guide-row" data-range="${g.range}">
      <span class="guide-range" style="color:${g.color}">${g.range}</span>
      <div>
        <div class="guide-text-label">${esc(g.label)}</div>
        <div class="guide-text-desc">${esc(g.desc)}</div>
      </div>
    </div>`).join('');
}

function updateGuidePanel() {
  if (!guideOpen) return;
  const current = guideForValue(form.intensity);
  document.querySelectorAll('#guide-panel .guide-row').forEach(row => {
    row.classList.toggle('active', row.dataset.range === current.range);
  });
}

document.getElementById('guide-toggle').addEventListener('click', () => {
  guideOpen = !guideOpen;
  const panel = document.getElementById('guide-panel');
  panel.classList.toggle('hidden', !guideOpen);
  document.getElementById('guide-toggle').textContent = guideOpen ? '닫기' : '강도 안내 ?';
  if (guideOpen) updateGuidePanel();
});

buildGuidePanel();

// ── Feedback ───────────────────────────────────────────────────────────────
function updateFeedback() {
  const diff = form.intensity - form.intensityAfter;
  const el = document.getElementById('reduction-feedback');
  if (diff > 0) {
    el.innerHTML = `<div class="feedback-good">👍 분노 강도가 <strong>${diff}점</strong> 낮아졌어요. 잘 하셨습니다!</div>`;
  } else if (diff < 0) {
    el.innerHTML = `<div class="feedback-bad">💬 강도가 올라갔네요. 다른 활동을 시도해 보세요.</div>`;
  } else {
    el.innerHTML = '';
  }
}

// ── Init sliders ───────────────────────────────────────────────────────────
setupSlider('slider-before','slider-before-fill','slider-before-thumb','gauge-before-num','gauge-before-name','intensity');
setupSlider('slider-after', 'slider-after-fill', 'slider-after-thumb', 'gauge-after-num', 'gauge-after-name','intensityAfter');

// ── Single-select tag groups ───────────────────────────────────────────────
document.getElementById('timeslot-group').addEventListener('click', e => {
  const btn = e.target.closest('.tag-btn');
  if (!btn) return;
  const val = btn.dataset.val;
  form.timeSlot = form.timeSlot === val ? '' : val;
  document.querySelectorAll('#timeslot-group .tag-btn').forEach(b => b.classList.toggle('active', b.dataset.val === form.timeSlot));
});

// ── Multi-select tag groups ────────────────────────────────────────────────
document.getElementById('trigger-group').addEventListener('click', e => {
  const btn = e.target.closest('.tag-btn');
  if (!btn) return;
  const val = btn.dataset.val;
  const idx = form.triggers.indexOf(val);
  if (idx >= 0) form.triggers.splice(idx, 1); else form.triggers.push(val);
  btn.classList.toggle('active', form.triggers.includes(val));
});

document.getElementById('coping-group').addEventListener('click', e => {
  const btn = e.target.closest('.coping-btn');
  if (!btn) return;
  // Tap on icon → show detail panel
  const iconEl = btn.querySelector('.coping-icon');
  if (e.target === iconEl || iconEl.contains(e.target)) {
    showCopingDetail(btn.dataset.val);
    return;
  }
  const val = btn.dataset.val;
  const idx = form.copingActivities.indexOf(val);
  if (idx >= 0) form.copingActivities.splice(idx, 1); else form.copingActivities.push(val);
  btn.classList.toggle('active', form.copingActivities.includes(val));
});

// ── Save ───────────────────────────────────────────────────────────────────
document.getElementById('save-btn').addEventListener('click', () => {
  const situation = document.getElementById('situation').value.trim();
  const thought   = document.getElementById('thought').value.trim();
  if (!situation && !thought) {
    alert('상황 또는 자동 생각을 입력해 주세요.');
    return;
  }
  const log = {
    id: Date.now(),
    date: new Date().toISOString(),
    timeSlot: form.timeSlot,
    situation,
    triggers: [...form.triggers],
    intensity: form.intensity,
    thought,
    action: document.getElementById('action').value.trim(),
    alternative: document.getElementById('alternative').value.trim(),
    copingActivities: [...form.copingActivities],
    intensityAfter: form.intensityAfter,
  };
  logs.push(log);
  saveLogs();

  // Reset form
  document.getElementById('situation').value = '';
  document.getElementById('thought').value = '';
  document.getElementById('action').value = '';
  document.getElementById('alternative').value = '';
  form.timeSlot = '';
  form.triggers = [];
  form.copingActivities = [];
  document.querySelectorAll('#timeslot-group .tag-btn, #trigger-group .tag-btn, #coping-group .coping-btn').forEach(b => b.classList.remove('active'));

  const btn = document.getElementById('save-btn');
  btn.textContent = '✓  저장되었어요';
  btn.classList.add('saved');
  setTimeout(() => { btn.textContent = '기록 저장하기'; btn.classList.remove('saved'); }, 2000);
  setTimeout(() => switchTab('history'), 600);
});

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.getElementById('tab-record').classList.toggle('hidden', id !== 'record');
  document.getElementById('tab-history').classList.toggle('hidden', id !== 'history');
  document.getElementById('tab-stats').classList.toggle('hidden', id !== 'stats');
  if (id === 'history') renderHistory();
  if (id === 'stats')   renderStats();
}
document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

// ── History ────────────────────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('history-list');
  if (!logs.length) {
    el.innerHTML = '<div class="empty">아직 기록이 없어요.<span>첫 번째 기록을 남겨보세요.</span></div>';
    return;
  }
  el.innerHTML = [...logs].reverse().map(log => {
    const { date, time } = formatDateTime(log.date);
    const color = ANGER_COLORS[log.intensity];
    const afterColor = log.intensityAfter != null ? ANGER_COLORS[log.intensityAfter] : null;
    const reduction = afterColor ? log.intensity - log.intensityAfter : null;
    const triggers = (log.triggers||[]).map(t => `<span class="log-trigger-tag">${esc(t)}</span>`).join('');
    const activities = (log.copingActivities||[]).map(id => {
      const m = COPING_META[id]; if (!m) return '';
      return `<span class="log-activity-tag">${m.icon} ${esc(m.name)}</span>`;
    }).join('');

    return `
    <div class="log-card">
      <div class="log-date">${esc(date)}</div>
      <div class="log-timeslot">${log.timeSlot ? `<span style="color:#444;margin-right:8px">${esc(log.timeSlot)}</span>` : ''}${esc(time)}</div>
      <div class="log-intensity-row">
        <span class="log-intensity" style="color:${color}">강도 ${log.intensity}</span>
        ${afterColor ? `
          <span class="log-arrow">→</span>
          <span class="log-intensity-after" style="color:${afterColor}">${log.intensityAfter}</span>
          ${reduction > 0 ? `<span class="log-reduce-badge">−${reduction} 감소</span>` : ''}
        ` : ''}
        <div class="log-triggers">${triggers}</div>
      </div>
      ${log.situation ? `<div class="log-field"><span class="log-field-label">상황</span>${esc(log.situation)}</div>` : ''}
      ${log.thought   ? `<div class="log-field log-thought">"${esc(log.thought)}"</div>` : ''}
      ${log.action    ? `<div class="log-field log-action"><span class="log-field-label">행동</span>${esc(log.action)}</div>` : ''}
      ${activities    ? `<div class="log-activities">${activities}</div>` : ''}
      ${log.alternative ? `<div class="log-alt">→ ${esc(log.alternative)}</div>` : ''}
      <button class="log-delete" data-id="${log.id}">×</button>
    </div>`;
  }).join('');

  el.querySelectorAll('.log-delete').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!confirm('이 기록을 삭제할까요?')) return;
      logs = logs.filter(l => l.id !== Number(btn.dataset.id));
      saveLogs(); renderHistory();
    });
  });
}

// ── Stats ──────────────────────────────────────────────────────────────────
function getFilteredLogs(period) {
  const now = new Date();
  return logs.filter(l => {
    const d = new Date(l.date);
    if (period === 'day') {
      return d.toDateString() === now.toDateString();
    } else if (period === 'week') {
      const startOfWeek = new Date(now);
      startOfWeek.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1));
      startOfWeek.setHours(0,0,0,0);
      return d >= startOfWeek;
    } else if (period === 'month') {
      return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    }
    return true; // all
  });
}

function renderStats() {
  const el = document.getElementById('stats-content');
  const filtered = getFilteredLogs(currentPeriod);

  const periodLabel = { day:'오늘', week:'이번 주', month:'이번 달', all:'전체' }[currentPeriod];

  if (!filtered.length) {
    el.innerHTML = `<div class="empty">${periodLabel} 기록이 없어요.<span>다른 기간을 선택해 보세요.</span></div>`;
    return;
  }

  const avg = (filtered.reduce((s,l) => s + l.intensity, 0) / filtered.length).toFixed(1);
  const maxVal = Math.max(...filtered.map(l => l.intensity));
  const logsWithAfter = filtered.filter(l => l.intensityAfter != null);
  const avgReduce = logsWithAfter.length
    ? (logsWithAfter.reduce((s,l) => s + (l.intensity - l.intensityAfter), 0) / logsWithAfter.length).toFixed(1)
    : null;

  // trigger count
  const trigCount = {};
  filtered.forEach(l => (l.triggers||[]).forEach(t => { trigCount[t] = (trigCount[t]||0) + 1; }));
  const topTrigs = Object.entries(trigCount).sort((a,b)=>b[1]-a[1]).slice(0,4);

  // coping count
  const copCount = {};
  filtered.forEach(l => (l.copingActivities||[]).forEach(id => { copCount[id] = (copCount[id]||0) + 1; }));
  const topCop = Object.entries(copCount).sort((a,b)=>b[1]-a[1]).slice(0,3);

  const recent7 = filtered.slice(-7).reverse();

  const trigBars = topTrigs.map(([name, cnt]) => `
    <div class="bar-row">
      <span class="bar-name">${esc(name)}</span>
      <div class="bar-track"><div class="bar-fill" style="background:#E57373;width:${(cnt/filtered.length)*100}%"></div></div>
      <span class="bar-count">${cnt}</span>
    </div>`).join('');

  const copBars = topCop.map(([id, cnt]) => {
    const m = COPING_META[id]; if (!m) return '';
    return `
    <div class="bar-row">
      <span style="font-size:18px;margin-right:4px">${m.icon}</span>
      <span class="bar-name">${esc(m.name)}</span>
      <div class="bar-track"><div class="bar-fill" style="background:#4FC3F7;width:${(cnt/filtered.length)*100}%"></div></div>
      <span class="bar-count">${cnt}</span>
    </div>`;
  }).join('');

  const chartCols = recent7.map(l => {
    const h = Math.max(6, (l.intensity / 10) * 90);
    const hA = l.intensityAfter != null ? Math.max(3, (l.intensityAfter / 10) * 90) : null;
    const col = ANGER_COLORS[l.intensity];
    const colA = l.intensityAfter != null ? ANGER_COLORS[l.intensityAfter] : null;
    const labelBefore = `<span style="font-family:'DM Serif Display',serif;font-size:22px;color:${col};font-weight:700;line-height:1">${l.intensity}</span>`;
    const labelAfter  = hA != null ? `<span style="font-family:'DM Serif Display',serif;font-size:19px;color:${colA};opacity:0.85;line-height:1">→${l.intensityAfter}</span>` : '';
    return `
    <div class="chart-col">
      <div class="chart-bars-inner">
        <div class="chart-bar" style="width:${hA?'45%':'80%'};height:${h}px;background:${col};opacity:0.85"></div>
        ${hA ? `<div class="chart-bar" style="width:45%;height:${hA}px;background:${colA};opacity:0.6"></div>` : ''}
      </div>
      <div style="display:flex;gap:2px;align-items:baseline;margin-top:5px">${labelBefore}${labelAfter}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${filtered.length}회</div><div class="stat-label">총 기록</div></div>
      <div class="stat-card"><div class="stat-val">${avg}</div><div class="stat-label">평균 강도</div></div>
      <div class="stat-card"><div class="stat-val">${maxVal}</div><div class="stat-label">최고 강도</div></div>
      <div class="stat-card"><div class="stat-val">${avgReduce != null ? '−' + avgReduce : '—'}</div><div class="stat-label">평균 감소폭</div></div>
    </div>
    ${topTrigs.length ? `<div class="stats-block"><div class="stats-title">주요 트리거</div>${trigBars}</div>` : ''}
    ${topCop.length   ? `<div class="stats-block"><div class="stats-title">자주 사용한 활동</div>${copBars}</div>` : ''}
    <div class="stats-block">
      <div class="stats-title">강도 변화 (활동 전 · 후)</div>
      <div class="chart-bars" style="height:100px;align-items:flex-end">${chartCols}</div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#EF5350;opacity:0.85"></div><span class="legend-text">활동 전</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#4FC3F7;opacity:0.6"></div><span class="legend-text">활동 후</span></div>
      </div>
    </div>`;
}

updateFeedback();

// ── Period tab switching ────────────────────────────────────────────────────
document.querySelectorAll('.period-btn').forEach(b => {
  b.addEventListener('click', () => {
    currentPeriod = b.dataset.period;
    document.querySelectorAll('.period-btn').forEach(x => x.classList.toggle('active', x === b));
    renderStats();
  });
});

// ── Coping activity detail panel ───────────────────────────────────────────
function showCopingDetail(key) {
  const m = COPING_META[key];
  if (!m || !m.steps) return;
  const stepsHTML = m.steps.map((s, i) => `
    <li>
      <div class="coping-step-num">${i + 1}</div>
      <div class="coping-step-text">${esc(s)}</div>
    </li>`).join('');

  const overlay = document.createElement('div');
  overlay.className = 'coping-detail-overlay';
  overlay.innerHTML = `
    <div class="coping-detail-panel">
      <div class="coping-detail-icon">${m.icon}</div>
      <div class="coping-detail-title">${esc(m.name)}</div>
      <div class="coping-detail-subtitle">${esc(m.subtitle)}</div>
      <ul class="coping-detail-steps">${stepsHTML}</ul>
      ${m.tip ? `<div class="coping-detail-tip">💡 ${esc(m.tip)}</div>` : ''}
      <button class="coping-detail-close">닫기</button>
    </div>`;
  document.body.appendChild(overlay);

  const close = () => overlay.remove();
  overlay.querySelector('.coping-detail-close').addEventListener('click', close);
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
}

// Remove the old coping-group click handler (replaced below with new one)
// New combined handler: icon tap → detail, name/card area → toggle selection
const copingGroup = document.getElementById('coping-group');

// Long-press support
let longPressTimer;
copingGroup.addEventListener('pointerdown', e => {
  const btn = e.target.closest('.coping-btn');
  if (!btn) return;
  longPressTimer = setTimeout(() => { showCopingDetail(btn.dataset.val); }, 600);
});
copingGroup.addEventListener('pointerup',    () => clearTimeout(longPressTimer));
copingGroup.addEventListener('pointerleave', () => clearTimeout(longPressTimer));

// ── Reset all logs ─────────────────────────────────────────────────────────
document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('모든 기록을 삭제할까요?\n이 작업은 되돌릴 수 없습니다.')) return;
  logs = [];
  saveLogs();
  renderStats();
  const btn = document.getElementById('reset-btn');
  btn.textContent = '✓ 초기화 완료';
  btn.style.borderColor = '#388E3C';
  btn.style.color = '#388E3C';
  setTimeout(() => { btn.textContent = '🗑️ 전체 기록 초기화'; btn.style.borderColor = ''; btn.style.color = ''; }, 2000);
});
</script>
