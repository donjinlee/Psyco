function useWakeLock(){
  const ref=useRef(null);
  const acquire=useCallback(async()=>{ if("wakeLock"in navigator) try{ ref.current=await navigator.wakeLock.request("screen"); }catch{} },[]);
  const release=useCallback(()=>{ if(ref.current){ ref.current.release(); ref.current=null; } },[]);
  return {acquire,release};
}

/* ── TIMER ENGINE ── */
function usePhaseTimer({ phases, cycles, onFinish }){
  const [display,setDisplay]=useState({pi:0,cycle:1,elapsed:0,done:false});
  const [paused,setPaused]=useState(false);
  const eng=useRef({pi:0,cycle:1,startTime:null,pausedElapsed:0});
  const pausedRef=useRef(false);
  const onFinishRef=useRef(onFinish);
  useEffect(()=>{ onFinishRef.current=onFinish; },[onFinish]);

  useEffect(()=>{
    eng.current={pi:0,cycle:1,startTime:Date.now(),pausedElapsed:0};
    pausedRef.current=false;
    const id=setInterval(()=>{
      if(pausedRef.current) return;
      const e=eng.current;
      if(e.startTime===null) return;
      const elapsed=(Date.now()-e.startTime)/1000;
      const phaseSec=phases[e.pi].sec;
      if(elapsed>=phaseSec){
        const nextPi=e.pi+1;
        if(nextPi>=phases.length){
          const nextCycle=e.cycle+1;
          if(nextCycle>cycles){
            e.startTime=null;
            setDisplay({pi:e.pi,cycle:e.cycle,elapsed:phaseSec,done:true});
            clearInterval(id);
            setTimeout(()=>onFinishRef.current(),50);
            return;
          }
          e.cycle=nextCycle; e.pi=0;
        } else { e.pi=nextPi; }
        e.startTime=Date.now(); e.pausedElapsed=0;
        setDisplay({pi:e.pi,cycle:e.cycle,elapsed:0,done:false});
      } else {
        setDisplay({pi:e.pi,cycle:e.cycle,elapsed,done:false});
      }
    },80);
    return ()=>clearInterval(id);
  },[]);

  const togglePause=useCallback(()=>{
    setPaused(p=>{
      const next=!p;
      pausedRef.current=next;
      if(next){
        if(eng.current.startTime!==null){
          eng.current.pausedElapsed=(Date.now()-eng.current.startTime)/1000;
          eng.current.startTime=null;
        }
      } else {
        eng.current.startTime=Date.now()-eng.current.pausedElapsed*1000;
      }
      return next;
    });
  },[]);

  return {display,paused,togglePause};
}

/* ── BOX BREATH PLAYER ── */
function BoxBreathPlayer({onDone}){
  const tech=TECHNIQUES.find(t=>t.id==="box");
  const phases=tech.phases; const CYCLES=tech.cycles;
  const {acquire,release}=useWakeLock();
  useEffect(()=>{ acquire(); return ()=>release(); },[]);
  const [finished,setFinished]=useState(false);
  const {display,paused,togglePause}=usePhaseTimer({phases,cycles:CYCLES,onFinish:()=>setFinished(true)});
  const {pi,cycle,elapsed}=display;
  const phase=phases[pi];
  const progress=Math.min(elapsed/phase.sec,1);
  const remaining=Math.max(Math.ceil(phase.sec-elapsed),0);
  const CX=130,CY=130,HALF=90;
  const corners=[{x:CX-HALF,y:CY-HALF},{x:CX+HALF,y:CY-HALF},{x:CX+HALF,y:CY+HALF},{x:CX-HALF,y:CY+HALF}];
  const segS=corners[pi]; const segE=corners[(pi+1)%4];
  const dotX=segS.x+(segE.x-segS.x)*progress;
  const dotY=segS.y+(segE.y-segS.y)*progress;
  const phaseColors=[T.accent,T.teal,T.violet,T.warn];

  if(finished) return(
    <div style={{...S.page,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <div style={{fontSize:64,marginBottom:16}}>✨</div>
      <div style={{fontSize:22,fontWeight:800,color:T.teal,marginBottom:8}}>완료!</div>
      <p style={{color:T.muted,fontSize:14}}>{CYCLES}회 완료했습니다.</p>
      <button style={{...S.btn(T.teal),maxWidth:280,marginTop:24}} onClick={onDone}>돌아가기</button>
    </div>
  );
  return(
    <div style={{...S.page,display:"flex",flexDirection:"column",alignItems:"center",paddingTop:36,paddingBottom:40}}>
      <button style={{...S.back,alignSelf:"flex-start",marginLeft:20,marginBottom:12}} onClick={()=>{release();onDone();}}>← 나가기</button>
      <div style={{fontSize:16,fontWeight:700,color:T.muted}}>박스 호흡법</div>
      <div style={{fontSize:12,color:T.dim,marginBottom:16}}>사이클 {cycle} / {CYCLES}</div>
      <svg width={260} height={260} style={{overflow:"visible"}}>
        <rect x={CX-HALF} y={CY-HALF} width={HALF*2} height={HALF*2} fill="none" stroke={T.border} strokeWidth={3} rx={6}/>
        {Array.from({length:pi}).map((_,i)=>(
          <line key={i} x1={corners[i].x} y1={corners[i].y} x2={corners[(i+1)%4].x} y2={corners[(i+1)%4].y} stroke={phaseColors[i]} strokeWidth={4} strokeLinecap="round"/>
        ))}
        <line x1={segS.x} y1={segS.y} x2={dotX} y2={dotY} stroke={phase.color} strokeWidth={4} strokeLinecap="round"/>
        <circle cx={dotX} cy={dotY} r={11} fill={phase.color}/>
        <text x={CX} y={CY-HALF-16} textAnchor="middle" fill={pi===0?phases[0].color:T.dim} fontSize={12} fontWeight={700}>들숨 4s</text>
        <text x={CX+HALF+16} y={CY+5} textAnchor="start" fill={pi===1?phases[1].color:T.dim} fontSize={12} fontWeight={700}>멈춤 4s</text>
        <text x={CX} y={CY+HALF+24} textAnchor="middle" fill={pi===2?phases[2].color:T.dim} fontSize={12} fontWeight={700}>날숨 4s</text>
        <text x={CX-HALF-16} y={CY+5} textAnchor="end" fill={pi===3?phases[3].color:T.dim} fontSize={12} fontWeight={700}>멈춤 4s</text>
        <text x={CX} y={CY-8} textAnchor="middle" fill={phase.color} fontSize={40} fontWeight={900}>{remaining}</text>
        <text x={CX} y={CY+22} textAnchor="middle" fill={T.text} fontSize={16} fontWeight={700}>{phase.label}</text>
      </svg>
      <div style={{display:"flex",gap:8,marginTop:16,flexWrap:"wrap",justifyContent:"center",padding:"0 20px"}}>
        {phases.map((p,i)=>(
          <div key={i} style={{padding:"6px 14px",borderRadius:20,background:i===pi?p.color:T.bg,border:`1.5px solid ${i===pi?p.color:T.border}`,fontSize:12,color:i===pi?"#fff":T.muted,fontWeight:700}}>
            {p.label} {p.sec}s
          </div>
        ))}
      </div>
      <button onClick={togglePause} style={{marginTop:24,background:T.bg,border:`1.5px solid ${T.border}`,color:T.text,borderRadius:12,padding:"10px 28px",fontSize:14,cursor:"pointer"}}>
        {paused?"▶ 재개":"⏸ 일시정지"}
      </button>
    </div>
  );
}

/* ── SESSION ── */
function SessionScreen({onBack,data,onSave}){
  const [step,setStep]=useState("precheck");
  const [draft,setDraft]=useState({date:new Date().toISOString(),pre:{mood:null,anxiety:null},post:{mood:null,anxiety:null},techs:[],reflection:""});
  const [chosen,setChosen]=useState(null);
  const [detail,setDetail]=useState(null);

  function finishPractice(){ setDraft(d=>({...d,techs:d.techs.includes(chosen.title)?d.techs:[...d.techs,chosen.title]})); setChosen(null); setStep("pick"); }
  function finish(){ onSave({sessions:[draft,...data.sessions]}); setStep("done"); }

  if(step==="detail"&&detail) return(
    <TechDetail tech={detail} onBack={()=>{setDetail(null);setStep("pick");}} onPractice={t=>{setDetail(null);setChosen(t);setStep("practice");}}/>
  );

  if(step==="practice"&&chosen){
    if(chosen.id==="box") return <BoxBreathPlayer onDone={finishPractice}/>;
    if(chosen.phases) return <BreathPlayer phases={chosen.phases} cycles={chosen.cycles} title={chosen.title} onDone={finishPractice}/>;
    if(chosen.muscleGroups) return <PMRPlayer tech={chosen} onDone={finishPractice}/>;
    if(chosen.senses) return <GroundingPlayer tech={chosen} onDone={finishPractice}/>;
    return(
      <div style={S.page}>
        <div style={S.hdr}><button style={S.back} onClick={finishPractice}>← 완료</button><h2 style={S.ttl}>{chosen.title}</h2></div>
        <div style={{padding:20}}>
          {chosen.steps.map((s,i)=>(
            <div key={i} style={{...S.card,display:"flex",gap:14}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:T.cold,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:"#fff",flexShrink:0}}>{i+1}</div>
              <span style={{fontSize:14,lineHeight:1.75,paddingTop:2}}>{s}</span>
            </div>
          ))}
          {chosen.caution&&<p style={{fontSize:12,color:T.warn,marginTop:4}}>⚠️ {chosen.caution}</p>}
          <button style={S.btn(T.cold)} onClick={finishPractice}>완료 ✓</button>
        </div>
      </div>
    );
  }

  if(step==="precheck") return(
    <div style={S.page}>
      <div style={S.hdr}><button style={S.back} onClick={onBack}>←</button><h2 style={S.ttl}>연습 전 상태 확인</h2></div>
      <div style={{padding:"20px 20px 0"}}>
        <p style={{fontSize:13,color:T.muted,lineHeight:1.75,marginBottom:20}}>연습 전후 상태를 비교해 변화를 확인합니다.</p>
        <CheckCard label="지금 기분은?" labels={MOOD_LABELS} value={draft.pre.mood} onChange={v=>setDraft(d=>({...d,pre:{...d.pre,mood:v}}))} color={T.accent}/>
        <CheckCard label="지금 불안 수준은?" labels={ANXIETY_LABELS} value={draft.pre.anxiety} onChange={v=>setDraft(d=>({...d,pre:{...d.pre,anxiety:v}}))} color={T.warn}/>
        <button disabled={draft.pre.mood===null||draft.pre.anxiety===null}
          style={{...S.btn(T.accent),opacity:(draft.pre.mood===null||draft.pre.anxiety===null)?0.4:1,marginTop:16}}
          onClick={()=>setStep("pick")}>다음 →</button>
      </div>
    </div>
  );

  if(step==="pick") return(
    <div style={S.page}>
      <div style={S.hdr}><button style={S.back} onClick={()=>setStep("precheck")}>←</button><h2 style={S.ttl}>기법 선택</h2></div>
      <div style={{padding:"16px 20px 0"}}>
        {draft.techs.length>0&&(
          <div style={{...S.card,borderColor:`${T.teal}44`,background:`${T.teal}08`,marginBottom:4}}>
            <div style={{fontSize:12,color:T.teal,fontWeight:700,marginBottom:6}}>✓ 오늘 연습한 기법</div>
            {draft.techs.map((t,i)=><div key={i} style={{fontSize:13,color:T.muted}}>{t}</div>)}
          </div>
        )}
        <p style={{fontSize:12,color:T.muted,lineHeight:1.7,margin:"12px 0 14px"}}>기법 이름을 탭하면 설명을 볼 수 있습니다. <strong style={{color:T.text}}>▶ 연습</strong> 버튼으로 바로 시작하세요.</p>
        {TECHNIQUES.map(t=>{
          const done=draft.techs.includes(t.title);
          return(
            <div key={t.id} style={{display:"flex",alignItems:"center",background:done?`${T.teal}08`:T.card,border:`1.5px solid ${done?T.teal+"55":T.border}`,borderRadius:16,marginBottom:10,overflow:"hidden",boxShadow:T.shadow}}>
              <button onClick={()=>{setDetail(t);setStep("detail");}} style={{display:"flex",alignItems:"center",gap:12,flex:1,background:"none",border:"none",padding:"14px 16px",cursor:"pointer",textAlign:"left"}}>
                <span style={{fontSize:26}}>{t.icon}</span>
                <div>
                  <div style={{fontSize:14,fontWeight:700,color:done?T.teal:t.color||T.text}}>{t.title}{done?" ✓":""}</div>
                  <div style={{fontSize:11,color:T.muted,marginTop:2}}>{t.sub} · 탭하면 설명 보기</div>
                </div>
              </button>
              <button onClick={()=>{setChosen(t);setStep("practice");}} style={{background:t.color||T.accent,border:"none",color:"#fff",padding:"0 18px",minHeight:60,fontSize:12,fontWeight:800,cursor:"pointer",whiteSpace:"nowrap"}}>▶ 연습</button>
            </div>
          );
        })}
        {draft.techs.length>0&&<button style={S.btn(T.teal)} onClick={()=>setStep("postcheck")}>연습 마치고 기록하기 →</button>}
      </div>
    </div>
  );

  if(step==="postcheck") return(
    <div style={S.page}>
      <div style={S.hdr}><button style={S.back} onClick={()=>setStep("pick")}>←</button><h2 style={S.ttl}>연습 후 상태 & Reflection</h2></div>
      <div style={{padding:"20px 20px 0"}}>
        <CheckCard label="지금 기분은?" labels={MOOD_LABELS} value={draft.post.mood} onChange={v=>setDraft(d=>({...d,post:{...d.post,mood:v}}))} color={T.accent}/>
        <CheckCard label="지금 불안 수준은?" labels={ANXIETY_LABELS} value={draft.post.anxiety} onChange={v=>setDraft(d=>({...d,post:{...d.post,anxiety:v}}))} color={T.warn}/>
        <div style={S.card}>
          <div style={S.lbl}>오늘의 Reflection (선택)</div>
          <textarea value={draft.reflection} onChange={e=>setDraft(d=>({...d,reflection:e.target.value}))}
            placeholder="오늘 연습에서 느낀 것, 몸의 변화, 어려웠던 점 등을 자유롭게 적어보세요."
            style={{width:"100%",minHeight:110,background:T.bg,border:`1px solid ${T.border}`,borderRadius:10,color:T.text,fontSize:14,padding:12,resize:"vertical",lineHeight:1.75,boxSizing:"border-box"}}/>
        </div>
        <button disabled={draft.post.mood===null||draft.post.anxiety===null}
          style={{...S.btn(T.teal),opacity:(draft.post.mood===null||draft.post.anxiety===null)?0.4:1}}
          onClick={finish}>세션 완료 저장 ✓</button>
      </div>
    </div>
  );

  if(step==="done"){
    const md=draft.post.mood-draft.pre.mood; const ad=draft.pre.anxiety-draft.post.anxiety;
    return(
      <div style={{...S.page,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:"0 28px",textAlign:"center"}}>
        <div style={{fontSize:64,marginBottom:16}}>🎉</div>
        <div style={{fontSize:24,fontWeight:900,color:T.teal,marginBottom:8}}>오늘 연습 완료!</div>
        <p style={{color:T.muted,fontSize:14,lineHeight:1.85,marginBottom:24}}>
          {draft.techs.join(", ")} 연습을 마쳤습니다.<br/>
          {md>0&&`기분이 ${md}단계 나아졌습니다. `}{ad>0&&`불안이 ${ad}단계 줄었습니다.`}
          {md<=0&&ad<=0&&"꾸준한 연습이 쌓여갑니다."}
        </p>
        <button style={{...S.btn(T.accent),maxWidth:280,marginTop:8}} onClick={onBack}>홈으로 →</button>
      </div>
    );
  }
  return null;
}

/* ── LOG ── */
function LogScreen({onBack,data,onReset}){
  const [sel,setSel]=useState(null);
  const [confirmReset,setConfirmReset]=useState(false);
  const today=new Date(); const year=today.getFullYear(),month=today.getMonth();
  const todayStr=today.toISOString().slice(0,10);
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  function cntDay(d){ const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; return data.sessions.filter(s=>s.date.startsWith(ds)).length; }

  if(sel!==null){
    const s=data.sessions[sel]; const md=s.post.mood-s.pre.mood; const ad=s.pre.anxiety-s.post.anxiety;
    return(
      <div style={S.page}>
        <div style={S.hdr}><button style={S.back} onClick={()=>setSel(null)}>←</button>
          <h2 style={S.ttl}>{new Date(s.date).toLocaleDateString("ko-KR",{month:"long",day:"numeric"})} 기록</h2>
        </div>
        <div style={{padding:"20px 20px 0"}}>
          <div style={S.card}>
            <div style={S.lbl}>연습 전 → 후</div>
            <div style={{display:"flex",gap:12}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:T.muted,marginBottom:4}}>기분 (전)</div><div style={{fontSize:13}}>{MOOD_LABELS[s.pre.mood]}</div>
                <div style={{fontSize:11,color:T.muted,marginTop:10,marginBottom:4}}>불안 (전)</div><div style={{fontSize:13}}>{ANXIETY_LABELS[s.pre.anxiety]}</div>
              </div>
              <div style={{width:1,background:T.border}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:T.muted,marginBottom:4}}>기분 (후)</div><div style={{fontSize:13}}>{MOOD_LABELS[s.post.mood]}</div>
                <div style={{fontSize:11,color:T.muted,marginTop:10,marginBottom:4}}>불안 (후)</div><div style={{fontSize:13}}>{ANXIETY_LABELS[s.post.anxiety]}</div>
              </div>
            </div>
            {(md!==0||ad!==0)&&(
              <div style={{display:"flex",gap:8,marginTop:14}}>
                {md>0&&<span style={{fontSize:11,background:`${T.accent}22`,color:T.accent,borderRadius:8,padding:"2px 8px"}}>기분 +{md}</span>}
                {md<0&&<span style={{fontSize:11,background:`${T.danger}22`,color:T.danger,borderRadius:8,padding:"2px 8px"}}>기분 {md}</span>}
                {ad>0&&<span style={{fontSize:11,background:`${T.teal}22`,color:T.teal,borderRadius:8,padding:"2px 8px"}}>불안 -{ad}</span>}
              </div>
            )}
          </div>
          <div style={S.card}><div style={S.lbl}>연습한 기법</div>{s.techs.map((t,i)=><div key={i} style={{fontSize:14,color:T.teal,marginBottom:5}}>✓ {t}</div>)}</div>
          {s.reflection&&<div style={S.card}><div style={S.lbl}>Reflection</div><p style={{fontSize:14,color:T.text,lineHeight:1.85,margin:0,whiteSpace:"pre-wrap"}}>{s.reflection}</p></div>}
        </div>
      </div>
    );
  }

  return(
    <div style={S.page}>
      <div style={S.hdr}><button style={S.back} onClick={onBack}>←</button><h2 style={S.ttl}>연습 기록</h2></div>
      <div style={{padding:"16px 20px 0"}}>
        <div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:700,color:T.text}}>{year}년 {month+1}월</div>
            <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:T.muted}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:T.accent}}/> 연습 완료
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
            {["일","월","화","수","목","금","토"].map(d=><div key={d} style={{textAlign:"center",fontSize:11,color:T.muted,fontWeight:700}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
            {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}/>)}
            {Array.from({length:daysInMonth},(_,i)=>i+1).map(d=>{
              const cnt=cntDay(d);
              const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
              const isToday=ds===todayStr;
              return(
                <div key={d} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"4px 0"}}>
                  <div style={{fontSize:11,color:isToday?T.accent:T.muted,fontWeight:isToday?800:400,marginBottom:3}}>{d}</div>
                  <div style={{width:18,height:18,borderRadius:"50%",background:cnt>0?T.accent:"transparent",border:isToday?`2px solid ${T.accent}`:cnt>0?"none":`1.5px solid ${T.dim}`}}/>
                </div>
              );
            })}
          </div>
        </div>

        {data.sessions.length===0?(
          <div style={{textAlign:"center",padding:"40px 0",color:T.muted}}>
            <div style={{fontSize:48,marginBottom:12}}>📋</div>
            <div style={{fontSize:15}}>아직 기록이 없습니다.</div>
          </div>
        ):(
          <>
            <div style={{fontSize:11,color:T.muted,fontWeight:700,letterSpacing:1,marginBottom:10}}>세션 기록</div>
            {data.sessions.map((s,i)=>{
              const md=s.post.mood-s.pre.mood,ad=s.pre.anxiety-s.post.anxiety;
              return(
                <button key={i} onClick={()=>setSel(i)} style={{display:"block",width:"100%",background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 18px",marginBottom:10,cursor:"pointer",textAlign:"left",boxShadow:T.shadow}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:14,fontWeight:700,color:T.text}}>{new Date(s.date).toLocaleDateString("ko-KR",{month:"long",day:"numeric",weekday:"short"})}</span>
                    <span style={{fontSize:12,color:T.muted}}>{new Date(s.date).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}</span>
                  </div>
                  <div style={{fontSize:12,color:T.muted,marginBottom:6}}>{s.techs.join(" · ")||"기법 미선택"}</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {md>0&&<span style={{fontSize:11,background:`${T.accent}22`,color:T.accent,borderRadius:8,padding:"2px 8px"}}>기분 +{md}</span>}
                    {ad>0&&<span style={{fontSize:11,background:`${T.teal}22`,color:T.teal,borderRadius:8,padding:"2px 8px"}}>불안 -{ad}</span>}
                    {s.reflection&&<span style={{fontSize:11,background:`${T.violet}22`,color:T.violet,borderRadius:8,padding:"2px 8px"}}>✍️ reflection</span>}
                  </div>
                </button>
              );
            })}
          </>
        )}

        <div style={{marginTop:16,paddingTop:16,borderTop:`1px solid ${T.border}`}}>
          {!confirmReset?(
            <button onClick={()=>setConfirmReset(true)} style={{background:"none",border:`1.5px solid ${T.danger}55`,color:T.danger,borderRadius:12,padding:"10px 20px",fontSize:13,cursor:"pointer",width:"100%"}}>
              🗑 전체 기록 초기화
            </button>
          ):(
            <div style={{...S.card,borderColor:`${T.danger}55`,background:"#fff5f5"}}>
              <p style={{fontSize:14,color:T.text,margin:"0 0 14px",lineHeight:1.7}}>모든 연습 기록이 삭제됩니다. 이 작업은 되돌릴 수 없습니다. 계속하시겠습니까?</p>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>{onReset();setConfirmReset(false);}} style={{flex:1,background:T.danger,color:"#fff",border:"none",borderRadius:10,padding:"11px",fontSize:14,fontWeight:700,cursor:"pointer"}}>삭제합니다</button>
                <button onClick={()=>setConfirmReset(false)} style={{flex:1,background:T.bg,border:`1.5px solid ${T.border}`,color:T.text,borderRadius:10,padding:"11px",fontSize:14,cursor:"pointer"}}>취소</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── ROOT ── */
function App(){
  const [screen,setScreen]=useState("home");
  const [data,setData]=useState(loadData);
  function persist(u){ setData(u); saveData(u); }
  function reset(){ const d={sessions:[]}; setData(d); saveData(d); }

  if(screen==="info")      return <InfoScreen      onBack={()=>setScreen("home")}/>;
  if(screen==="emergency") return <EmergencyScreen onBack={()=>setScreen("home")}/>;
  if(screen==="session")   return <SessionScreen   onBack={()=>setScreen("home")} data={data} onSave={persist}/>;
  if(screen==="log")       return <LogScreen       onBack={()=>setScreen("home")} data={data} onReset={reset}/>;
  return <HomeScreen onNav={setScreen} data={data}/>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
