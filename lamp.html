@import url('https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap');

:root{
  --text:#4a3f48; --muted:#8a7d8c; --soft:#b1a4b4;
  --ember:#e07a45; --ember2:#d3673a; --ember-soft:rgba(224,122,69,.14);
  --sage:#4f9b78; --sage2:#3f8a68; --sage-soft:rgba(79,155,120,.14);
  --moon:#7c66c4; --moon-soft:rgba(124,102,196,.14);
  --line:rgba(74,63,72,.13); --glass:rgba(255,255,255,.74);
  --ok:#3f8a68; --warn:#d3673a;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body,#root{margin:0; padding:0; height:100%;}
.app{
  min-height:100vh; width:100%;
  background:
    radial-gradient(120% 80% at 50% -8%, rgba(244,180,120,.40), transparent 55%),
    radial-gradient(90% 60% at 88% 8%, rgba(176,160,224,.22), transparent 60%),
    radial-gradient(80% 60% at 0% 30%, rgba(150,200,175,.20), transparent 60%),
    linear-gradient(180deg,#fff8f0 0%, #fdeede 55%, #fbe7d8 100%);
  display:flex; justify-content:center;
  font-family:'Gowun Dodum',sans-serif; color:var(--text);
}
.phone{
  width:100%; max-width:440px; min-height:100vh;
  display:flex; flex-direction:column; position:relative;
  background:linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,.12));
}
.head{display:flex; align-items:center; gap:10px; padding:18px 20px 10px; position:relative;}
.back{background:#fff; border:1px solid var(--line); color:var(--text);
  width:34px;height:34px;border-radius:50%; font-size:22px; line-height:1;
  display:flex;align-items:center;justify-content:center; cursor:pointer; padding-bottom:3px;
  box-shadow:0 2px 8px -4px rgba(74,63,72,.3);}
.brand{font-family:'Gowun Batang',serif; font-size:16px; letter-spacing:.04em; display:flex; align-items:center; gap:8px; color:var(--muted);}
.lamp{width:9px;height:9px;border-radius:50%; background:var(--ember);
  box-shadow:0 0 12px 3px rgba(224,122,69,.55); display:inline-block;}
.body{flex:1; padding:6px 20px 24px; overflow-y:auto;}
.fade{animation:fade .5s ease both;}
@keyframes fade{from{opacity:0; transform:translateY(10px)}to{opacity:1;transform:none}}

.vow{position:relative; overflow:hidden; border-radius:24px; padding:24px 22px 22px;
  margin:6px 0 20px;
  background:linear-gradient(135deg, rgba(244,180,120,.55) 0%, rgba(255,255,255,.85) 48%, rgba(176,160,224,.4) 100%);
  border:1px solid rgba(224,122,69,.3);
  box-shadow:0 14px 36px -16px rgba(224,122,69,.6);}
.vow:before{content:""; position:absolute; right:-30px; top:-30px; width:140px; height:140px; border-radius:50%;
  background:radial-gradient(circle, rgba(244,180,120,.7), transparent 70%); filter:blur(8px);}
.vow-q{position:absolute; left:14px; top:2px; font-family:'Gowun Batang',serif; font-size:60px;
  color:rgba(224,122,69,.35); line-height:1;}
.vow-label{position:relative; display:inline-block; font-size:12px; letter-spacing:.06em; color:var(--ember2);
  font-weight:700; margin-bottom:12px; padding-left:2px;}
.vow-line{position:relative; font-family:'Gowun Batang',serif; color:#3a2f30; margin:0; font-weight:700;
  line-height:1.5; text-shadow:0 1px 0 rgba(255,255,255,.5);}
.vow-1{font-size:20px; margin-bottom:8px;}
.vow-2{font-size:21px; color:#3a2f30;}

.kicker{font-size:12.5px; color:var(--soft); letter-spacing:.03em; margin:6px 0 6px;}
.title{font-family:'Gowun Batang',serif; font-size:26px; line-height:1.4; margin:0 0 18px; font-weight:700; color:#3c333c;}
.title.sm{font-size:22px; margin:10px 0;}
.mini-stat{background:var(--ember-soft); border:1px solid rgba(224,122,69,.28); border-radius:16px;
  padding:12px 14px; font-size:13.5px; color:var(--muted); margin-bottom:16px;}
.mini-stat b{color:var(--ember); font-family:'Gowun Batang',serif;}
.mini-stat b.ok{color:var(--ok);}

.big-card{
  width:100%; text-align:left; border:1px solid var(--line);
  border-radius:22px; padding:20px 18px; margin-bottom:14px; cursor:pointer;
  display:flex; flex-direction:column; gap:5px; color:var(--text);
  background:var(--glass); transition:transform .15s ease, box-shadow .2s ease;
  position:relative; overflow:hidden; box-shadow:0 6px 22px -14px rgba(74,63,72,.4);
}
.big-card:active{transform:scale(.985);}
.big-card .bc-ic{font-size:22px; margin-bottom:4px;}
.big-card .bc-tt{font-family:'Gowun Batang',serif; font-size:19px; font-weight:700; color:#3c333c;}
.big-card .bc-sub{font-size:13px; color:var(--muted); line-height:1.55;}
.big-card.ember{background:linear-gradient(135deg,rgba(244,180,120,.45),rgba(255,255,255,.8));
  border-color:rgba(224,122,69,.3); box-shadow:0 10px 28px -16px rgba(224,122,69,.7);}
.big-card.ember .bc-ic{color:var(--ember);}
.big-card.sage{background:linear-gradient(135deg,rgba(150,200,175,.42),rgba(255,255,255,.82));
  border-color:rgba(79,155,120,.3); box-shadow:0 10px 28px -16px rgba(79,155,120,.6);}
.big-card.sage .bc-ic{color:var(--sage);}
.big-card.moon{background:linear-gradient(135deg,rgba(176,160,224,.4),rgba(255,255,255,.82));
  border-color:rgba(124,102,196,.3); box-shadow:0 10px 28px -16px rgba(124,102,196,.55);}
.big-card.moon .bc-ic{color:var(--moon);}

.sec-tt{font-family:'Gowun Batang',serif; font-size:22px; margin:8px 0 6px; font-weight:700;}
.sub-tt{font-family:'Gowun Batang',serif; font-size:17px; margin:22px 0 8px;}
.sec-sub{font-size:13px; color:var(--muted); line-height:1.6; margin:0 0 16px;}
.ember-tx{color:var(--ember);} .sage-tx{color:var(--sage);} .moon-tx{color:var(--moon);}

.card{border:1px solid var(--line); border-radius:20px; padding:16px; margin-bottom:14px;}
.glass{background:var(--glass); backdrop-filter:blur(8px); box-shadow:0 4px 18px -14px rgba(74,63,72,.4);}
.card-h{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
.card-no{width:26px;height:26px;border-radius:50%; display:flex;align-items:center;justify-content:center;
  font-family:'Gowun Batang',serif; font-weight:700; font-size:14px; color:#fff;}
.ember-bg{background:var(--ember);} .sage-bg{background:var(--sage);}
.card-tt{font-family:'Gowun Batang',serif; font-size:16.5px; font-weight:700; color:#3c333c;}
.card-tx{font-size:13.5px; color:var(--muted); line-height:1.7; margin:0 0 12px;}
.card-tx b{color:var(--text);}

.q{font-size:14.5px; font-weight:400; margin:2px 0 10px; color:var(--text);}
.q.small{font-size:13px; margin-top:14px; color:var(--muted);}
.q .soft{color:var(--soft); font-size:12px;}

.chips{display:flex; flex-wrap:wrap; gap:8px;}
.chip{font-family:'Gowun Dodum',sans-serif; font-size:13px; padding:8px 13px; border-radius:999px;
  border:1px solid var(--line); background:rgba(255,255,255,.6); color:var(--muted); cursor:pointer;
  transition:all .14s ease;}
.chip:active{transform:scale(.96);}
.chip-on{color:#fff; font-weight:400; border-color:transparent;}
.chip-ember{background:var(--ember);} .chip-sage{background:var(--sage);} .chip-moon{background:var(--moon);}
.chip-on:not(.chip-ember):not(.chip-sage):not(.chip-moon){background:var(--ember);}

.range{width:100%; accent-color:var(--ember); margin:4px 0 14px; height:24px;}

.inp,.ta{width:100%; background:#fff; border:1px solid var(--line); border-radius:13px;
  padding:11px 13px; color:var(--text); font-family:'Gowun Dodum',sans-serif; font-size:13.5px; margin-top:10px;
  outline:none; resize:none;}
.inp::placeholder,.ta::placeholder{color:var(--soft);}
.inp:focus,.ta:focus{border-color:rgba(224,122,69,.55);}

.checks{display:flex; flex-direction:column; gap:8px;}
.check{display:flex; align-items:center; gap:10px; text-align:left; font-size:13.5px; color:var(--muted);
  background:rgba(255,255,255,.6); border:1px solid var(--line); border-radius:13px; padding:11px 13px; cursor:pointer;}
.check .box{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--soft); display:flex;
  align-items:center;justify-content:center; font-size:13px; color:#fff; flex:0 0 auto;}
.check-on{color:var(--text); border-color:transparent;}
.check-on.sage{background:var(--sage-soft);}
.check-on .box{background:var(--sage); border-color:var(--sage);}

.cta{width:100%; border:none; border-radius:16px; padding:15px; font-size:15px; font-weight:700;
  font-family:'Gowun Batang',serif; cursor:pointer; margin-top:6px; color:#fff; transition:transform .14s ease, filter .2s;}
.cta:active{transform:scale(.98);}
.cta:disabled{opacity:.45;}
.ember-cta{background:linear-gradient(135deg,var(--ember),var(--ember2)); box-shadow:0 10px 26px -12px rgba(224,122,69,.7);}
.sage-cta{background:linear-gradient(135deg,var(--sage),var(--sage2)); box-shadow:0 10px 26px -12px rgba(79,155,120,.6);}
.moon-cta{background:linear-gradient(135deg,var(--moon),#6b57b0); box-shadow:0 10px 26px -12px rgba(124,102,196,.6);}

.hint{font-size:12px; color:var(--soft); line-height:1.6; margin:8px 0 0;}
.center{text-align:center;}
.row{display:flex; align-items:center;}
.gap{gap:10px;}

.breath-wrap{display:flex; flex-direction:column; align-items:center; gap:14px; padding:8px 0 4px;}
.breath-circle{width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle at 50% 40%, rgba(244,180,120,.85), rgba(224,122,69,.25));
  border:1px solid rgba(224,122,69,.4); display:flex; align-items:center; justify-content:center;
  transition:transform ease; color:#7a3f22; font-size:14px; font-family:'Gowun Batang',serif;
  box-shadow:0 0 40px -10px rgba(224,122,69,.6);}
.btn-soft{background:var(--ember-soft); border:1px solid rgba(224,122,69,.35); color:var(--ember);
  border-radius:999px; padding:9px 20px; font-size:13.5px; cursor:pointer; font-family:'Gowun Dodum',sans-serif;}
.btn-ghost{background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:999px;
  padding:9px 18px; font-size:13.5px; cursor:pointer;}

.surf-wrap{display:flex; flex-direction:column; align-items:center; gap:12px;}
.surf-pool{width:100%; height:96px; border-radius:16px; overflow:hidden; position:relative;
  background:linear-gradient(180deg, rgba(176,160,224,.22), rgba(244,180,120,.18)); border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center;}
.surf-wave{position:absolute; bottom:-30px; left:-50%; width:200%; height:80px; border-radius:45%;
  background:rgba(224,122,69,.3); animation:wave 6s linear infinite paused;}
.surf-on .surf-wave{animation-play-state:running;}
@keyframes wave{from{transform:rotate(0deg) translateX(0)}to{transform:rotate(360deg)}}
.surf-time{position:relative; font-family:'Gowun Batang',serif; font-size:30px; letter-spacing:.04em; color:#3c333c;}

.tabs{display:flex; border-top:1px solid var(--line); background:rgba(255,255,255,.82);
  backdrop-filter:blur(12px); position:sticky; bottom:0;}
.tab{flex:1; background:none; border:none; padding:10px 4px 12px; cursor:pointer; color:var(--soft);
  display:flex; flex-direction:column; align-items:center; gap:3px; font-family:'Gowun Dodum',sans-serif;}
.tab-ic{font-size:17px;}
.tab-lb{font-size:10.5px;}
.tab-on{color:var(--text);}
.tab-ember.tab-on{color:var(--ember);} .tab-sage.tab-on{color:var(--sage);} .tab-neutral.tab-on{color:var(--moon);}

.done{padding-top:40px;}
.done-ic{font-size:44px; color:var(--ember); margin-bottom:8px; text-shadow:0 0 24px rgba(224,122,69,.5);}

.summary{display:flex; gap:10px; margin-bottom:16px;}
.sum-box{flex:1; background:var(--glass); border:1px solid var(--line); border-radius:16px;
  padding:14px 8px; text-align:center; display:flex; flex-direction:column; gap:4px; box-shadow:0 4px 16px -14px rgba(74,63,72,.4);}
.sum-n{font-family:'Gowun Batang',serif; font-size:26px; font-weight:700; color:#3c333c;}
.sum-n.ok{color:var(--ok);}
.sum-l{font-size:11px; color:var(--soft);}

.log{border-top:1px solid var(--line); padding:12px 0;}
.log:first-of-type{border-top:none;}
.log-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
.log-date{font-size:12.5px; color:var(--muted);}
.badge{font-size:11px; padding:3px 10px; border-radius:999px;}
.badge-ok{background:var(--sage-soft); color:var(--sage);}
.badge-warn{background:var(--ember-soft); color:var(--ember);}
.log-tags{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px;}
.tag{font-size:11.5px; color:var(--muted); background:rgba(74,63,72,.06); padding:3px 9px; border-radius:8px;}
.tag-urge{color:var(--ember); background:var(--ember-soft);}
.log-cope{font-size:12.5px; color:var(--muted); margin:3px 0; line-height:1.5;}
.log-broke{font-size:12px; color:var(--ember); margin:3px 0;}
.log-note{font-size:12.5px; color:var(--text); font-style:italic; margin:4px 0 0; opacity:.92;}
.past{margin-top:20px;}
